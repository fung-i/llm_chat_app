name: build-desktop

# Builds the Tauri desktop app on macOS and Windows in parallel.
#
# - Push a tag like `v0.1.0` to create a draft GitHub Release with all installers attached.
# - Or trigger manually from the Actions tab to just produce build artifacts.
#
# Prereqs already satisfied in the repo:
#   * `src-tauri/icons/` contains the full icon set (icon.ico / icon.icns / sized PNGs)
#   * `sidecar/scripts/build-sidecar.mjs` automatically picks the correct triple for the host OS
#   * `tauri.conf.json` -> `externalBin` resolves to `llm-sidecar-<triple><.exe?>`

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: build-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon. Add `macos-13` here later if you also need an Intel .dmg.
          - os: macos-latest
            bun-version: '1.3.11'   # macOS sidecar must NOT use 1.3.12 (see docs/macos-sidecar-bun.md)
          - os: windows-latest
            bun-version: '1.3.11'   # Pinned for reproducibility; bump deliberately when needed.

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (src-tauri)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node dependencies (workspaces)
        run: npm ci

      - name: Build sidecar (single-file binary for host triple)
        run: npm run build:sidecar

      # tauri-action will:
      #   - run `beforeBuildCommand` (frontend `vite build`)
      #   - run `cargo tauri build` for the host target
      #   - upload bundled installers as workflow artifacts
      #   - if invoked from a tag push, create/update a draft GitHub Release with the bundles attached
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('LLM Chat App {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
